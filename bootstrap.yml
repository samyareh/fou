---
- hosts: all
  become: true
  tasks: 

    - name: install updates (CentOS,AlmaLinux)
      tags: always
      dnf:
        update_cache: yes
        update_only: yes
      when: ansible_distribution in ["CentOS","AlmaLinux"]




    - name: install updates (Ubuntu & Debian)
      tags: always
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_distribution in ["Ubuntu", "Debian"]



- hosts: all
  become: true
  tasks:


   - name: create user shak
     tags: always
     user:
       name: shak
       groups: root


   - name: add ssh key for shak
     tags: always
     authorized_key:
       user: shak
       key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM8CTHHmXwSoUbej0K8qJWHqvi5IxDU5Dvj4v+QTpsNs ansible"

   
   - name: add sudoer file for shak
     tags: always
     ansible.builtin.copy:
       src: files/my_sudoers
       dest: /etc/sudoers.d/shak
       owner: root
       group: root
       mode: 0440


